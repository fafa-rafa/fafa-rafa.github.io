<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>system</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #00ff9f;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: left;
  border-left: 2px solid #00ff9f;
  padding-left: 20px;
}

h1 {
  font-size: 40px;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00ff9f;
}

p {
  opacity: 0.7;
}

.glow {
  animation: flicker 2s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
</style>
</head>

<body>
  <div class="container glow">
    <h1>ACCESS GRANTED</h1>
    <p>system: online</p>
    <p>status: watching</p>
    <p>user: anonymous</p>
  </div>
</body>
</html>
